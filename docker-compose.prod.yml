services:
  # ─── Main App Database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sunflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sun_uw}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sunflow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Stack Auth: Dedicated Database ─────────────────────────────────────────
  stack-postgres:
    image: postgres:16-alpine
    container_name: sunflow-stack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stackauth
      POSTGRES_USER: stackauth
      POSTGRES_PASSWORD: ${STACK_DB_PASSWORD:?STACK_DB_PASSWORD is required}
    volumes:
      - stack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stackauth"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Stack Auth: ClickHouse (analytics) ─────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: sunflow-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: stackframe
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/users.d/allow-experimental-json.xml:/etc/clickhouse-server/users.d/allow-experimental-json.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password=${CLICKHOUSE_PASSWORD}", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Stack Auth Server ───────────────────────────────────────────────────────
  stack-server:
    image: sunflow-stack-server:latest
    build:
      context: .
      dockerfile: Dockerfile.stack-auth
    container_name: sunflow-stack-server
    restart: unless-stopped
    depends_on:
      stack-postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      # Database (official var names from stack-auth .env.example)
      STACK_DATABASE_CONNECTION_STRING: "postgresql://stackauth:${STACK_DB_PASSWORD}@stack-postgres:5432/stackauth"

      # Server secrets & URLs
      STACK_SERVER_SECRET: "${STACK_SERVER_SECRET:?STACK_SERVER_SECRET is required}"
      NEXT_PUBLIC_STACK_API_URL: "${NEXT_PUBLIC_STACK_API_URL:?NEXT_PUBLIC_STACK_API_URL is required}"
      NEXT_PUBLIC_STACK_DASHBOARD_URL: "${NEXT_PUBLIC_STACK_URL:?NEXT_PUBLIC_STACK_URL is required}"

      # Seed script (creates the internal Dashboard project on first boot)
      STACK_RUN_MIGRATIONS: "true"
      STACK_RUN_SEED_SCRIPT: "true"
      STACK_SEED_INTERNAL_PROJECT_ALLOW_LOCALHOST: "true"
      STACK_SEED_INTERNAL_PROJECT_SIGN_UP_ENABLED: "true"

      # Email (SMTP — uses Inbucket locally, real SMTP in production)
      STACK_EMAIL_HOST: "${STACK_EMAIL_HOST:-inbucket}"
      STACK_EMAIL_PORT: "${STACK_EMAIL_PORT:-2500}"
      STACK_EMAIL_USERNAME: "${STACK_EMAIL_USERNAME:-}"
      STACK_EMAIL_PASSWORD: "${STACK_EMAIL_PASSWORD:-}"
      STACK_EMAIL_SECURE: "${STACK_EMAIL_SECURE:-false}"
      STACK_EMAIL_SENDER: "${STACK_EMAIL_SENDER:-noreply@sunflow.local}"

      # ClickHouse (analytics)
      STACK_CLICKHOUSE_URL: "http://clickhouse:8123"
      STACK_CLICKHOUSE_ADMIN_USER: default
      STACK_CLICKHOUSE_ADMIN_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      STACK_CLICKHOUSE_EXTERNAL_USER: default
      STACK_CLICKHOUSE_EXTERNAL_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    ports:
      - "${STACK_DASHBOARD_PORT:-8101}:8101"
      - "${STACK_API_PORT:-8102}:8102"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8102/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── Local SMTP sink (fallback when external SMTP is unavailable) ────────────
  inbucket:
    image: inbucket/inbucket:stable
    container_name: sunflow-inbucket
    restart: unless-stopped
    ports:
      - "8105:9000"
      - "2500:2500"

  # ─── Migrations (runs once and exits) ────────────────────────────────────────
  migrate:
    image: sunflow-app:latest
    container_name: sunflow-migrate
    command: ["npx", "prisma", "migrate", "deploy"]
    volumes:
      - ./prisma.config.ts:/app/prisma.config.ts:ro
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ─── Application ─────────────────────────────────────────────────────────────
  app:
    image: sunflow-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-SunFlowCRM}"
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}"
        NEXT_PUBLIC_API_DOMAIN: "${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}"
        NEXT_PUBLIC_AUTH_PROVIDER: "stack"
        NEXT_PUBLIC_STACK_PROJECT_ID: "${NEXT_PUBLIC_STACK_PROJECT_ID:?NEXT_PUBLIC_STACK_PROJECT_ID is required}"
        NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: "${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY:-${NEXT_PUBLIC_STACK_PUBLISHABLE_KEY:?NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY or NEXT_PUBLIC_STACK_PUBLISHABLE_KEY is required}}"
        NEXT_PUBLIC_STACK_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STACK_PUBLISHABLE_KEY:-}"
        NEXT_PUBLIC_STACK_URL: "${NEXT_PUBLIC_STACK_URL}"
        NEXT_PUBLIC_STACK_API_URL: "${NEXT_PUBLIC_STACK_API_URL}"
    container_name: sunflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      stack-server:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000

      # Application
      NEXT_PUBLIC_APP_NAME: "${NEXT_PUBLIC_APP_NAME:-SunFlowCRM}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}"
      NEXT_PUBLIC_API_DOMAIN: "${NEXT_PUBLIC_APP_URL}"

      # Auth provider — Stack Auth
      AUTH_PROVIDER: "stack"
      NEXT_PUBLIC_AUTH_PROVIDER: "stack"

      # Stack Auth keys (obtained from Stack Auth Dashboard after first boot)
      NEXT_PUBLIC_STACK_PROJECT_ID: "${NEXT_PUBLIC_STACK_PROJECT_ID:?NEXT_PUBLIC_STACK_PROJECT_ID is required}"
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: "${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY:-${NEXT_PUBLIC_STACK_PUBLISHABLE_KEY:?NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY or NEXT_PUBLIC_STACK_PUBLISHABLE_KEY is required}}"
      STACK_SECRET_SERVER_KEY: "${STACK_SECRET_SERVER_KEY:-${STACK_SECRET_KEY:?STACK_SECRET_SERVER_KEY or STACK_SECRET_KEY is required}}"

      # Stack Auth server URLs
      NEXT_PUBLIC_STACK_URL: "${NEXT_PUBLIC_STACK_URL}"
      NEXT_PUBLIC_STACK_API_URL: "${NEXT_PUBLIC_STACK_API_URL}"
      # Server-only internal URL for Stack SDK calls from Node runtime
      STACK_INTERNAL_API_URL: "http://stack-server:8102"

      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"

      # Worker secret
      INTERNAL_WORKER_SECRET: "${INTERNAL_WORKER_SECRET:?INTERNAL_WORKER_SECRET is required}"

      # Stack Auth webhook verification secret (Svix signing secret)
      STACK_WEBHOOK_SECRET: "${STACK_WEBHOOK_SECRET:-}"

      # Anthropic API key for server-side AI analysis routes
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"

      # Sentry (optional)
      NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
      NEXT_PUBLIC_SENTRY_ORG: "${NEXT_PUBLIC_SENTRY_ORG:-}"
      NEXT_PUBLIC_SENTRY_PROJECT: "${NEXT_PUBLIC_SENTRY_PROJECT:-}"
      SENTRY_AUTH_TOKEN: "${SENTRY_AUTH_TOKEN:-}"
      NEXT_PUBLIC_SENTRY_DISABLED: "${NEXT_PUBLIC_SENTRY_DISABLED:-false}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/auth/signout').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Background worker ────────────────────────────────────────────────────────
  worker:
    image: sunflow-app:latest
    container_name: sunflow-worker
    restart: unless-stopped
    command: ["npx", "tsx", "workers/notifications-worker.ts"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production

      # Database
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sun_uw}"

      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"

      # Worker secret
      INTERNAL_WORKER_SECRET: "${INTERNAL_WORKER_SECRET}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"

volumes:
  postgres_data:
  redis_data:
  stack_postgres_data:
  clickhouse_data:
